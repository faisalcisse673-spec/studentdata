# Spring Boot Configuration
spring.application.name=studentdata

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/studentdata?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false

# Server Configuration
server.port=8081
server.servlet.context-path=/api

# Logging
logging.level.com.epo.studentdata=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Upload directory (adaptez le chemin selon votre systeme)
file.upload-dir=./uploads/
